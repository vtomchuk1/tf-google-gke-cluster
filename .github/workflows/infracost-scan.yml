name: Infracost Scan & Commit

on:
  push:
    branches: [main]

permissions:
  contents: write # Необхідно для виконання git push назад у репозиторій

jobs:
  infracost-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Встановлюємо актуальний Infracost CLI за правильним шляхом
      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      # 2. Генеруємо фінансовий звіт у форматі JSON
      - name: Generate Cost Report
        run: |
          infracost breakdown --path . \
                              --format json \
                              --out-file infracost-report.json

      # 3. Автоматичний коміт файлу звіту
      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add infracost-report.json
          
          # Перевіряємо наявність змін, щоб не створювати пусті коміти
          if git diff --staged --quiet; then
            echo "No changes in cost report. Skipping commit."
          else
            git commit -m "chore: update infracost budget report [skip ci]"
            git push origin main
          fi